{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/theme.js' %}" defer></script>
</head>
<body>
    <div class="page-backdrop"><div class="orb"></div></div>

    <section class="auth-shell">
        <div class="theme-toggle-row">
            <button type="button" class="theme-toggle" data-theme-toggle>Switch theme</button>
        </div>
        <div class="auth-layout">
            <div class="hero-panel alt auth-side otp-stage">
                <div class="otp-lock">
                    <div class="otp-lock-icon">✦</div>
                </div>
                <div class="theme-kicker">Create Account</div>
                <h1 class="hero-title">Register herefor customer and staff access.</h1>
                <p class="hero-subtitle">Quick registration with secure verification.</p>

                <div class="landing-motion" style="margin-top: 28px; min-height: 180px;">
                    <div class="beam"></div>
                    <div class="motion-grid"></div>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring ring-two"></div>
                    <div class="motion-orb one"></div>
                    <div class="motion-orb two"></div>
                    <div class="floating-chip top">Fast Setup</div>
                    <div class="floating-chip mid">Secure Access</div>
                    <div class="floating-chip low">Role Based</div>
                </div>
            </div>

            <div class="auth-card">
                <div class="eyebrow">Register</div>
                <h2 class="panel-title" style="font-size: 1.9rem; margin-bottom: 8px;">Create your account</h2>

                {% if error %}
                    <div class="alert">{{ error }}</div>
                {% endif %}

                <form method="POST" class="auth-form">
                    {% csrf_token %}
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" type="text" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label for="role">Role</label>
                        <select id="role" name="role" required>
                            <option value="">Choose role</option>
                            <option value="customer">Customer</option>
                            <option value="staff">Staff</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Create account</button>
                </form>

                <div class="otp-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="footer-links">
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'landing' %}">Back</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
