{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/theme.js' %}" defer></script>
</head>
<body>
    <div class="page-backdrop"><div class="orb"></div></div>

    <section class="center-stage">
        <div class="theme-toggle-row">
            <button type="button" class="theme-toggle" data-theme-toggle>Switch theme</button>
        </div>
        <div class="glass-card center-card narrow otp-stage">
            <div class="otp-lock">
                <div class="otp-lock-icon">🔐</div>
            </div>
            <div class="theme-kicker">Secure verification</div>
            <h1 class="panel-title" style="font-size: 2rem; margin-bottom: 10px;">Enter your login code</h1>
            <p class="panel-copy">Use the code from your email.</p>

            <div class="landing-motion" style="min-height: 160px; margin-top: 22px;">
                <div class="beam"></div>
                <div class="motion-grid"></div>
                <div class="pulse-ring"></div>
                <div class="motion-orb one"></div>
                <div class="motion-orb two"></div>
                <div class="floating-chip top">Encrypted</div>
                <div class="floating-chip low">Verified Access</div>
            </div>

            <div class="note-card" style="margin-top: 22px;">
                Private. Temporary. One-time use.
            </div>

            <form method="POST" class="auth-form" style="margin-top: 22px;">
                {% csrf_token %}
                <div class="field">
                    <label for="otp">OTP code</label>
                    <input id="otp" type="text" name="otp" placeholder="Enter OTP" maxlength="6" required autocomplete="one-time-code" inputmode="numeric">
                    <div class="field-help">Valid for about 10 minutes.</div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Verify and continue</button>
            </form>

            <div class="otp-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="footer-links">
                <a href="{% url 'login' %}">Back to login</a>
                <a href="{% url 'landing' %}">Return to landing</a>
            </div>
        </div>
    </section>

    <script>
        const otpInput = document.getElementById("otp");
        if (otpInput) {
            otpInput.addEventListener("input", function () {
                this.value = this.value.replace(/[^0-9]/g, "");
            });
        }
    </script>
</body>
</html>
